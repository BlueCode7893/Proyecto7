<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Clínica Dental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #7abaff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { 
            background: white; 
            padding: 2rem; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="text-primary mb-4 fw-bold border-bottom pb-2">Acceso Clínica</h3>
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold text-muted">USUARIO</label>
            <input type="text" id="usuario" class="form-control" placeholder="Ingrese su usuario">
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold text-muted">CONTRASEÑA</label>
            <input type="password" id="password" class="form-control" placeholder="****">
        </div>
        <button type="button" class="btn btn-primary w-100 fw-bold" onclick="ejecutarLogin()">Entrar</button>
    </div>
    <script src="aplicacion.js"></script>
</body>
</html>
